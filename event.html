<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event — Prestige Events</title>
  <meta name="description" content="View the full gallery for this premium event.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header (injected by JS) -->
  <div id="site-header"></div>

  <main id="event-main">

    <!-- ═══════════════════════════════════════════
         Event Hero
         (breadcrumbs + title + cover; injected by event.js)
    ═══════════════════════════════════════════ -->
    <div class="event-hero">
      <!-- Breadcrumbs -->
      <div class="container">
        <div id="event-breadcrumbs"></div>
      </div>
      <!-- Hero inner -->
      <div id="event-hero"></div>
    </div>


    <!-- ═══════════════════════════════════════════
         Gallery Section
         (injected by event.js after image loading)
    ═══════════════════════════════════════════ -->
    <section
      id="gallery-section"
      class="gallery-section"
      aria-label="이벤트 갤러리"
    ></section>


    <!-- ═══════════════════════════════════════════
         Related Events
    ═══════════════════════════════════════════ -->
    <section
      id="related-section"
      class="related-section"
      aria-labelledby="related-title"
    >
      <div class="container">
        <div class="section__header">
          <div>
            <h2 class="section__title" id="related-title">Related Events</h2>
            <p class="section__subtitle">You might also be interested in these</p>
          </div>
          <a href="events.html" class="section__link">
            View All <span aria-hidden="true">→</span>
          </a>
        </div>
        <div id="related-events" class="events-grid events-grid--3"></div>
      </div>
    </section>

  </main>

  <!-- Footer (injected by JS) -->
  <div id="site-footer"></div>


  <!-- ═══════════════════════════════════════════
       Lightbox Modal
  ═══════════════════════════════════════════ -->
  <div
    id="lightbox"
    class="lightbox"
    role="dialog"
    aria-modal="true"
    aria-label="이미지 뷰어"
  >
    <button id="lb-close" class="lightbox__close" aria-label="닫기">&#215;</button>

    <button id="lb-prev" class="lightbox__prev" aria-label="이전 이미지">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="lightbox__img-wrap">
      <img id="lb-img" class="lightbox__img" src="" alt="">
    </div>

    <button id="lb-next" class="lightbox__next" aria-label="다음 이미지">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <div id="lb-counter" class="lightbox__counter" aria-live="polite" aria-atomic="true"></div>
  </div>


  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/event.js"></script>
</body>
</html>
