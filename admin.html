<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Prestige Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ── Auth Screen ─────────────────────────────────────── -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-card__logo">
        <div class="auth-card__logo-mark">PE</div>
        <div>
          <span class="auth-card__logo-name">DEEPDIVE Events</span>
          <span class="auth-card__logo-sub">Admin Panel</span>
        </div>
      </div>
      <h2>관리자 로그인</h2>
      <p class="auth-card__sub">PIN을 입력하세요.</p>
      <div id="auth-error" class="auth-error"></div>
      <div class="admin-field">
        <label class="admin-label" for="auth-pin">PIN</label>
        <input
          id="auth-pin"
          type="password"
          class="admin-input"
          placeholder="••••••••"
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <!-- 초기 설정 — 저장된 토큰이 없을 때만 표시 -->
      <div id="auth-setup" style="display:none;">
        <p class="auth-card__sub" style="margin-top:16px;border-top:1px solid var(--color-border);padding-top:16px;">
          처음 설정: GitHub Token과 레포지토리를 입력하면 이 브라우저에 저장됩니다.
        </p>
        <div class="admin-field">
          <label class="admin-label" for="auth-token">GitHub Personal Access Token</label>
          <input
            id="auth-token"
            type="password"
            class="admin-input"
            placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
            autocomplete="off"
            spellcheck="false"
          >
          <p class="admin-hint">
            <a href="https://github.com/settings/tokens/new?scopes=repo&description=eduops-gallery-admin" target="_blank" rel="noopener" style="color:#2563EB;">토큰 발급하기 →</a>
            &nbsp;(repo 스코프 선택)
          </p>
        </div>
        <div class="admin-field">
          <label class="admin-label" for="auth-repo">
            Repository <span>(기본값: URL에서 자동 감지)</span>
          </label>
          <input
            id="auth-repo"
            type="text"
            class="admin-input"
            placeholder="owner/repo-name"
            autocomplete="off"
            spellcheck="false"
          >
        </div>
      </div>

      <button id="auth-submit" class="btn-admin btn-admin--primary" style="width:100%;justify-content:center;margin-top:8px;">
        로그인
      </button>
    </div>
  </div>


  <!-- ── App (hidden until authed) ──────────────────────── -->
  <div id="admin-app" class="admin-app" style="display:none;">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand__mark">PE</div>
        <div>
          <span class="sidebar-brand__name" id="sb-brand-name">Prestige Events</span>
          <span class="sidebar-brand__sub">Admin</span>
        </div>
      </div>

      <span class="sidebar-section-label">콘텐츠</span>
      <nav>
        <button class="sidebar-nav-item is-active" data-view="settings-brand">
          <span class="sidebar-nav-icon">⚙</span>
          <span>브랜드 &amp; 히어로</span>
        </button>
        <button class="sidebar-nav-item" data-view="settings-sections">
          <span class="sidebar-nav-icon">☰</span>
          <span>섹션 텍스트</span>
        </button>
        <button class="sidebar-nav-item" data-view="settings-footer">
          <span class="sidebar-nav-icon">◫</span>
          <span>푸터 &amp; 소셜</span>
        </button>
        <button class="sidebar-nav-item" data-view="settings-integrations">
          <span class="sidebar-nav-icon">⬡</span>
          <span>연동 설정</span>
        </button>
      </nav>

      <span class="sidebar-section-label">이벤트</span>
      <nav>
        <button class="sidebar-nav-item" data-view="events">
          <span class="sidebar-nav-icon">▦</span>
          <span>이벤트 관리</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <a href="index.html" target="_blank" class="sidebar-footer-link">
          ↗ <span>사이트 미리보기</span>
        </a>
        <button id="btn-logout" class="sidebar-footer-link">
          ← <span>로그아웃</span>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="admin-main">

      <!-- Topbar -->
      <header class="admin-topbar">
        <span class="topbar-title" id="topbar-title">브랜드 &amp; 히어로</span>
        <div class="topbar-actions">
          <span class="dirty-badge" id="dirty-badge">● 저장되지 않은 변경사항</span>
          <button id="deploy-btn" class="btn-admin btn-admin--deploy" disabled>
            &#9650; 배포하기
          </button>
        </div>
      </header>

      <!-- Content -->
      <main class="admin-content" id="admin-content">
        <!-- Populated by admin.js -->
      </main>
    </div>

  </div>

  <!-- Loading overlay -->
  <div id="admin-loading" class="admin-loading" style="display:none;">
    <div class="spinner"></div>
    <span id="loading-text">불러오는 중…</span>
  </div>

  <!-- Toast -->
  <div id="admin-toast" class="admin-toast"></div>

  <script src="js/admin.js"></script>
</body>
</html>
